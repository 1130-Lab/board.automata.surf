services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=5m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  gemma4-board:
    build:
      context: ../..
      dockerfile: boards/ollama.gemma4/Dockerfile
    ports:
      - "11435:8080"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - GEMMA4_MODEL=gemma4:e4b
      - LISTEN_PREFIXES=http://0.0.0.0:8080
      - BOARD_HOST=http://board.automata.surf:8080
    depends_on:
      - ollama

volumes:
  ollama_data:
