services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=-1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  gemma4-board:
    build:
      context: ../..
      dockerfile: boards/ollama.board/Dockerfile
    ports:
      - "50061:50061"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - GEMMA4_MODEL=gemma4:e4b
      - BOARD_GRPC_PORT=50061
      - BOARD_COMPRESSION_FORMAT=gzip
      - BOARD_MODEL_KEEP_ALIVE=-1
    depends_on:
      - ollama

volumes:
  ollama_data:
